<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Aqua Match - SJWD Water District</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0d1b2a;
            font-family: 'Press Start 2P', 'Courier New', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            color: #e0e0e0;
        }

        #game-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        #game-container canvas {
            border: 4px solid #4a5568;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0, 191, 255, 0.3), 0 0 40px rgba(0, 191, 255, 0.1);
        }

        #mobile-controls {
            display: none;
            gap: 8px;
            justify-content: center;
            align-items: center;
            padding: 10px;
            width: 100%;
            max-width: 480px;
        }

        .ctrl-row {
            display: flex;
            gap: 8px;
            justify-content: center;
            width: 100%;
        }

        .ctrl-btn {
            font-family: 'Press Start 2P', 'Courier New', monospace;
            font-size: 11px;
            padding: 14px 18px;
            border: 2px solid #4a90d9;
            border-radius: 8px;
            background: linear-gradient(180deg, #1a3a5c 0%, #0d1b2a 100%);
            color: #7fdbff;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
            flex: 1;
            text-align: center;
            min-width: 60px;
            max-width: 110px;
            transition: background 0.1s, border-color 0.1s;
        }

        .ctrl-btn:active {
            background: linear-gradient(180deg, #2a5a8c 0%, #1a3a5c 100%);
            border-color: #7fdbff;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.4);
        }

        .ctrl-btn.drop-btn {
            background: linear-gradient(180deg, #1a3a1a 0%, #0d1b0d 100%);
            border-color: #44cc44;
            color: #7fff7f;
        }

        .ctrl-btn.drop-btn:active {
            background: linear-gradient(180deg, #2a5a2a 0%, #1a3a1a 100%);
            border-color: #7fff7f;
            box-shadow: 0 0 10px rgba(68, 204, 68, 0.4);
        }

        #footer {
            margin-top: 10px;
            text-align: center;
            font-size: 7px;
            color: #4a5568;
            line-height: 1.8;
        }

        @media (max-width: 520px) {
            body {
                justify-content: flex-start;
                padding-top: 5px;
            }

            #mobile-controls {
                display: flex;
                flex-direction: column;
            }
        }

        @media (pointer: coarse) {
            #mobile-controls {
                display: flex;
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div id="game-wrapper">
        <div id="game-container"></div>
        <div id="mobile-controls">
            <div class="ctrl-row">
                <button class="ctrl-btn" id="btn-left">◀</button>
                <button class="ctrl-btn" id="btn-rotate-l">↺</button>
                <button class="ctrl-btn" id="btn-rotate-r">↻</button>
                <button class="ctrl-btn" id="btn-right">▶</button>
            </div>
            <div class="ctrl-row">
                <button class="ctrl-btn drop-btn" id="btn-down">▼ DROP</button>
            </div>
        </div>
        <div id="footer">
            Author: Jeff Diaz &bull; &copy; 2026 SJWD Water District
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <script src="game.js"></script>
</body>
</html>
